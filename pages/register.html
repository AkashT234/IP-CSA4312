<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/user.css">
    <script src="js/user.js" defer></script>
</head>
<body>
    <header>
        <h1>Register for Library Access</h1>
    </header>

    <div class="container">
        <form class="form-container" id="registerForm">
            <label for="username">Username</label>
            <input type="text" id="username" class="input-field" placeholder="Enter your username" required>

            <label for="email">Email</label>
            <input type="email" id="email" class="input-field" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" class="input-field" placeholder="Create a password" required>

            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm your password" required>

            <button type="submit" class="submit-btn">Register</button>
        </form>
    </div>

    <footer>
        <p>Library Management System © 2024</p>
    </footer>

    <script>
        document.getElementById("registerForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            if (password !== confirmPassword) {
                alert("Passwords do not match!");
            } else {
                alert("Registration successful!");
            }
        });
    </script>
</body>
</html>

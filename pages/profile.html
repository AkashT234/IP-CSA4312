<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <link rel="stylesheet" href="css/profile.css">
</head>
<body>
  <div class="profile-container">
    <h2>User Profile</h2>
    <div class="profile-details">
      <p><strong>Username:</strong> <span id="username">JohnDoe</span></p>
      <p><strong>Email:</strong> <span id="email">johndoe@example.com</span></p>
      <button id="edit-profile">Edit Profile</button>
    </div>

    <div class="edit-profile-form" style="display: none;">
      <form>
        <label for="new-username">New Username:</label>
        <input type="text" id="new-username" placeholder="Enter new username" required>

        <label for="new-email">New Email:</label>
        <input type="email" id="new-email" placeholder="Enter new email" required>

        <button type="submit">Save Changes</button>
      </form>
    </div>
  </div>

  <script src="js/profile.js"></script>
</body>
</html>
